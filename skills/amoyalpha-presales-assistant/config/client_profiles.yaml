# 三类客户特征差异化模板
# 用于客户画像生成和 Prompt 注入

government:
  label: "政府客户"
  decision_chain:
    - role: "业务科室"
      concern: "能不能解决业务问题，好不好用，是否影响现有工作流程"
    - role: "信息化/大数据部门"
      concern: "是否合规（信创/等保），运维是否复杂，安全性"
    - role: "财务/采购部门"
      concern: "价格是否合理，是否有先例，采购流程合规"
    - role: "分管领导/一把手"
      concern: "是否有政治风险，有无标杆可参考，是否符合上级要求"
  core_pains:
    - "合规合法性焦虑（信创/等保/国产化）"
    - "政绩可量化需求（需要向上汇报的成果数字）"
    - "横向对标压力（邻市/同级单位已做的比较）"
    - "人员技能断层（IT团队人少技术弱，运维压力大）"
    - "预算申请难度（年度预算有限，专项资金申请复杂）"
  key_selling_points:
    - "国产自主可控（信创白名单、自主知识产权）"
    - "数据安全合规（私有化部署、等保认证）"
    - "政策背书（国家AI开放创新平台）"
    - "同类标杆案例（同级别政府单位的量化成果）"
  risk_signals:
    - "指定集成商为技术顾问（可能陪标）"
    - "要求不签框架协议（项目不稳定）"
    - "决策人频繁变动（项目可能被搁置）"
  proposal_tone: "正式、权威、强调合规与政策对齐，避免过多技术术语"
  preferred_format: "标准PPT（20-30页）+ 执行摘要（单页，供领导单独阅读）"

enterprise:
  label: "行业头部企业"
  decision_chain:
    - role: "业务VP"
      concern: "业务价值，效率ROI，快速出成果，解决具体业务问题"
    - role: "CTO/CDO"
      concern: "技术架构合理性，与现有系统集成，不造技术债，团队能维护"
    - role: "CFO/CEO"
      concern: "投资回报，战略价值，与行业竞争态势的关系"
  core_pains:
    - "效率ROI压力（生产/人工成本，需要用数字说话）"
    - "竞争代差焦虑（竞争对手已引入AI形成效率差距）"
    - "数据孤岛困境（多系统数据无法打通导致AI落不了地）"
    - "AI团队建设困境（自建成本高、招人难，外包又担心能力流失）"
  key_selling_points:
    - "行业最深积累（垂直场景模型库和成功案例）"
    - "可量化ROI（同类项目的真实数字）"
    - "无缝集成能力（与主流ERP/MES的标准接口）"
    - "标准共建机会（与行业协会共建，提升行业影响力）"
  risk_signals:
    - "CTO已宣布全面上某竞品（需评估是否值得投入）"
    - "业务VP和CTO诉求严重冲突（项目推进会很慢）"
    - "没有数据治理基础（AI项目落地前提条件缺失）"
  proposal_tone: "商业导向、重ROI数字、强调战略价值和行业影响力"
  preferred_format: "商业PPT（15-25页）+ ROI测算表 + 技术架构图"

tech:
  label: "技术型企业"
  decision_chain:
    - role: "AI/ML工程师"
      concern: "技术深度，API质量，文档完善度，社区活跃度（最重要的守门人）"
    - role: "CTO/技术VP"
      concern: "技术决策合理性，架构可扩展性，通常信任自己工程师的判断"
    - role: "CEO/CPO"
      concern: "商业价值，成本效益，合规风险"
  core_pains:
    - "算力效率与成本（训练/推理成本高）"
    - "模型性能瓶颈（精度/延迟/多模态在具体指标上达不到要求）"
    - "工程化落地难（从训练到生产的链路长，MLOps不成熟）"
    - "开源vs商业矛盾（想控制成本用开源，但开源能力不满足）"
    - "数据合规风险（调用境外API的数据出境问题）"
  key_selling_points:
    - "中文场景最优（ERNIE在中文Benchmark的表现）"
    - "国内合规部署（私有化，数据不出境）"
    - "轻量化微调（少量数据、低算力的LoRA方案）"
    - "完整工具链（从数据标注到部署的全流程，工程化时间节省）"
  risk_signals:
    - "工程师团队强烈抵制（未赢得技术信任，项目推进无效）"
    - "大量PyTorch自研代码（迁移成本是真实障碍，需要PoC验证）"
    - "已深度绑定竞品API（切换成本评估必要）"
  proposal_tone: "技术导向、有深度、直接给数字和代码示例，避免过度包装"
  preferred_format: "技术方案文档（10-15页）+ Benchmark对比表 + Live Demo Notebook"
