# 异议数据库 - 三类客户高频异议及应对话术
# 结构：id / 触发词 / 背后真实顾虑 / 三层话术 / 红线说法

government:
  - id: GOV-001
    trigger_keywords: ["预算不够", "价格高", "太贵", "超预算", "经费有限"]
    underlying_concern: "预算不足或需要争取更高领导审批，担心被追责"
    response_layer_1: "这个顾虑非常正常，很多单位在启动阶段都会面临预算约束的问题。"
    response_layer_2: "我们的方案支持分阶段实施——第一期可以聚焦最核心的[具体场景]，控制在[X]万以内，后续随效果逐步扩展，避免一次性大投入的审批压力。"
    response_layer_3: "类似的，[某市同类单位]就是采用分期模式，首期投入[X]万，验收通过后申请了数字政府专项经费，整体项目规模最终达到[X]万。我们可以帮您梳理适用的专项资金申请路径。"
    red_lines:
      - "你们可以申请专项资金（不要替客户做决定）"
      - "这个价格是最优惠的了（会被当成压价空间）"

  - id: GOV-002
    trigger_keywords: ["信创", "国产化", "自主可控", "合规", "等保", "白名单"]
    underlying_concern: "采购合规风险，害怕被审计或被上级单位否定"
    response_layer_1: "信创合规是政府采购中的硬性门槛，您的顾虑完全正确。"
    response_layer_2: "飞桨深度学习平台已通过[信创认证名称]，被纳入[白名单名称]，满足等保[二/三]级要求，私有化部署方案确保数据不出内网。"
    response_layer_3: "这是我们的认证证书和等保测评报告，[文件名]，可以直接作为采购合规性的支撑材料附入招标文件。[某省厅]最近的采购项目就直接引用了这套材料。"
    red_lines:
      - "这个我们可以想办法（暗示绕过合规要求，极度危险）"

  - id: GOV-003
    trigger_keywords: ["以前做过", "效果不好", "上次失败", "交付差", "烂尾"]
    underlying_concern: "过去AI项目失败的痛苦经历，害怕重蹈覆辙被追责"
    response_layer_1: "您说的这种情况我们听到过很多次，AI项目失败的背后原因通常是需求不清晰、验收标准模糊、或者交付后无人运维。"
    response_layer_2: "这次我们的做法不同：在立项阶段就会与您共同确定可量化的验收指标；方案中包含本地化驻场服务和3年运维支持；项目按里程碑付款，每个阶段达标才触发下一阶段。"
    response_layer_3: "我们可以设计一个8周的小型验证项目，聚焦[一个具体场景]，设置明确的效果指标。验证通过、您满意了，再推进完整项目。这样风险完全可控。"
    red_lines:
      - "上次那个项目是竞品的问题（攻击竞品会引发反感）"
      - "我们绝对不会出问题（过度承诺）"

  - id: GOV-004
    trigger_keywords: ["已经有系统了", "重复建设", "现有系统", "投资浪费"]
    underlying_concern: "担心重复投资被审计，或协调现有供应商的麻烦"
    response_layer_1: "保护已有投资是非常正确的考量，我们完全不建议推倒重建。"
    response_layer_2: "我们的方案专门设计了与[现有系统]的标准集成接口，是在现有基础上增加AI能力，而不是替换。现有系统的数据和业务逻辑完全保留。"
    response_layer_3: "[某单位]有类似情况，他们在原有[OA/政务系统]上叠加了我们的AI审批辅助模块，原系统完全不动，整个集成周期只有[X]周。"
    red_lines:
      - "那个系统很落后，应该换掉（批评客户现有采购决策）"

  - id: GOV-005
    trigger_keywords: ["上面没要求", "没有指示", "等等看", "再观察一下"]
    underlying_concern: "不愿做先行者，怕出错，需要"上面的尚方宝剑""
    response_layer_1: "稳妥行事是完全可以理解的，率先尝试确实有一定风险。"
    response_layer_2: "目前[上级主管单位/相邻城市]已经在推进类似项目，据我们了解[某政策文件]也明确提出了[相关要求]，现在启动既能抢先积累经验，也能响应上级方向。"
    response_layer_3: "我们可以先做一个[小规模试点/内部试用]，不对外公布，低调验证效果。如果效果好，您就有了向上汇报的真实数据支撑。"
    red_lines:
      - "你们落后于其他城市了（让对方难堪）"

enterprise:
  - id: ENT-001
    trigger_keywords: ["自建", "内部开发", "不想依赖外部", "核心能力"]
    underlying_concern: "担心被厂商锁定，核心AI能力外包后难以掌控"
    response_layer_1: "自建平台保留完整控制权，这个战略判断是正确的。"
    response_layer_2: "自建完整AI平台通常需要2000万以上投入和18个月周期，还面临招人难、留住难的问题。我们的方案可以作为您自建平台的底层基础——您保留数据、模型和业务逻辑的完整控制权，我们提供底层算力和工具链。"
    response_layer_3: "[某行业头部企业]采用了这种'平台底座+自建应用层'的混合架构，AI研发效率提升3倍，核心能力完全掌握在自己团队手中，供应商可随时切换。"
    red_lines:
      - "自建太难了，你们搞不定的（贬低客户技术能力）"

  - id: ENT-002
    trigger_keywords: ["集成复杂", "能对接吗", "系统太多", "IT部门不配合"]
    underlying_concern: "集成失败风险，担心项目烂尾或拖延"
    response_layer_1: "多系统集成确实是企业AI落地最大的工程挑战，这个顾虑很有先见之明。"
    response_layer_2: "我们在[贵司使用的ERP/MES品牌]上有成熟的集成经验，标准连接器已经开发好，不需要定制开发。集成周期通常是3-4周，不影响现有系统的正常运行。"
    response_layer_3: "可以安排您与[某个有相同IT架构的参考客户]的技术团队直接对话，他们当时也有同样的顾虑，实际集成只用了[X]周。"
    red_lines:
      - "这个应该问你们IT部门（推卸责任）"

  - id: ENT-003
    trigger_keywords: ["ROI", "怎么证明", "效果如何", "回报周期", "多久回本"]
    underlying_concern: "投资回报风险，CFO/CEO需要可量化的承诺"
    response_layer_1: "要求清晰的ROI测算完全合理，盲目投入AI项目是很多企业踩过的坑。"
    response_layer_2: "我们建议先做一个8周的PoC，在[最高价值的单一场景]上设置明确的效果指标：比如[具体指标，如审核时长从X天到Y天]。PoC费用可纳入正式合同预付款，达标后继续，不达标全额退款。"
    response_layer_3: "同行业的[参考客户]，PoC阶段将[具体业务场景]的人工成本降低了37%，据此测算全面铺开的ROI回收期约11个月，CFO批准了后续2000万的项目。"
    red_lines:
      - "ROI肯定没问题（没有数据支撑的保证）"
      - "业界平均都能提升50%（夸大）"

  - id: ENT-004
    trigger_keywords: ["华为", "阿里", "腾讯", "AWS", "微软", "已经选了", "战略合作"]
    underlying_concern: "已有战略供应商，担心引入新供应商增加管理成本或破坏关系"
    response_layer_1: "[竞品]在[其强势领域]确实很出色，我们也认可这一点。"
    response_layer_2: "我们关注的是在[竞品]不擅长的[具体场景]上填补空白——比如[具体差异化场景，如中文NLP精度/行业专属模型/私有化成本]，两者并不冲突，很多企业采用多供应商策略。"
    response_layer_3: "[某企业]也是[竞品]的战略合作伙伴，同时在[特定场景]使用我们的方案，两者配合反而比单一供应商的效果更好。我们可以出具两方共存的技术架构图。"
    red_lines:
      - "那个不如我们（直接贬低竞品）"
      - "他们的产品有严重问题（散布负面）"

tech:
  - id: TECH-001
    trigger_keywords: ["PyTorch", "TF", "TensorFlow", "只用PyTorch", "框架锁定", "迁移成本"]
    underlying_concern: "工程师有大量PyTorch代码和学习积累，迁移成本是真实障碍"
    response_layer_1: "工程师团队在PyTorch上的积累是真实资产，迁移成本确实需要认真评估。"
    response_layer_2: "飞桨支持PyTorch模型直接导入（torch2paddle转换工具），现有模型基本不需要重写。对于新模型，飞桨和PyTorch的API高度相似，工程师通常1-2天就能上手。我们提供专项迁移支持，包括转换工具和1对1技术答疑。"
    response_layer_3: "我们可以现场演示：把你们现在用的一个PyTorch模型文件，当场导入飞桨运行，你们的工程师可以全程监督。迁移如果确实有问题，我们负责帮你们解决。"
    red_lines:
      - "PyTorch不如飞桨（工程师会立刻反感）"
      - "迁移很简单的（低估工程师的实际痛点）"

  - id: TECH-002
    trigger_keywords: ["OpenAI", "GPT", "Claude", "为什么不用", "国外API", "Hugging Face"]
    underlying_concern: "国外模型能力更强/社区更好，为何要用国内方案"
    response_layer_1: "OpenAI/Claude的能力确实很强，这是客观事实，我们不回避。"
    response_layer_2: "核心差异在于：①数据出境的合规风险——调用OpenAI API，你们的生产数据会经过境外服务器，对于有数据安全要求的客户是硬伤；②私有化部署成本——OpenAI不支持私有化，相当于永远依赖外部；③中文场景——ERNIE在中文理解任务上和GPT-4相当甚至更优，有具体Benchmark可以对比。"
    response_layer_3: "我们可以用你们自己的测试数据，当场跑一个对比benchmark：ERNIE vs GPT-4在[你们的具体业务场景]上的表现。用你们的数据说话，比任何PPT都有说服力。"
    red_lines:
      - "OpenAI/Claude不如我们（工程师有自己判断，这样说会失去信任）"

  - id: TECH-003
    trigger_keywords: ["文档差", "社区小", "没人用", "生态不好", "不活跃"]
    underlying_concern: "担心踩坑没人帮，技术支持不到位"
    response_layer_1: "文档和社区质量直接影响工程效率，这个判断标准很专业。"
    response_layer_2: "飞桨中文文档是我们的强项——这是文档地址[URL]，你可以直接对比。GitHub上Issue的平均响应时间是[X小时]，这是近3个月的数据。对于合作客户，我们还提供专属技术支持群，核心工程师直接在群里答疑。"
    response_layer_3: "我们可以给你们一个为期2周的免费技术支持体验：你们工程师遇到任何问题，我们的技术专家24小时响应。如果体验不满意，我们不会推进合作。"
    red_lines:
      - "我们社区比PyTorch大（明显不实，立刻失去信任）"

  - id: TECH-004
    trigger_keywords: ["价格", "贵", "API费用", "token", "推理成本", "训练成本"]
    underlying_concern: "算力/API成本对商业模型有直接影响"
    response_layer_1: "对于AI原生产品来说，推理成本直接影响毛利率，您的关注非常到位。"
    response_layer_2: "我们提供三种降低成本的路径：①模型蒸馏——将大模型能力压缩到小模型，推理成本可降低70-90%；②LoRA微调——用少量数据微调专属模型，减少通用大模型的依赖；③混合部署——高频低难度请求走小模型，低频复杂请求走大模型。"
    response_layer_3: "可以先告诉我你们当前的QPS和平均token消耗，我们给你算一个优化方案和成本对比表，有了数字再决策。"
    red_lines:
      - "我们比OpenAI便宜多了（没有具体数字，空口无凭）"
