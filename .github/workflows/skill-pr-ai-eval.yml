name: Skill PR AI Eval

on:
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to evaluate
        required: true
        type: string
      model:
        description: Optional OpenAI-compatible model id override
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  skill-pr-ai-eval:
    name: skill-pr-ai-eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted repository tools
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target PR and changed skill
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(core.getInput('pull_request_number'));
            const { owner, repo } = context.repo;

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const skillDirs = new Set();
            for (const file of files) {
              if (file.filename.startsWith('skills/')) {
                const parts = file.filename.split('/');
                if (
                  parts.length >= 3 &&
                  parts[1] !== '_template' &&
                  parts[1] !== 'README.md'
                ) {
                  skillDirs.add(`skills/${parts[1]}`);
                }
              }
            }

            if (skillDirs.size !== 1) {
              core.setFailed(
                `Expected exactly one changed skill directory, found: ${Array.from(skillDirs).join(', ') || 'none'}`
              );
              return;
            }

            const skillPath = Array.from(skillDirs)[0];
            const skillSlug = skillPath.split('/')[1];

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('skill_path', skillPath);
            core.setOutput('skill_slug', skillSlug);

      - name: Checkout PR head into sandbox
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: pr-head
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check model credentials
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing required secret: OPENAI_API_KEY" >&2
            exit 1
          fi

      - name: Resolve eval model
        run: |
          MODEL_INPUT="${{ inputs.model }}"
          MODEL_DEFAULT="${{ vars.SKILL_EVAL_MODEL }}"

          if [ -n "$MODEL_INPUT" ]; then
            echo "SKILL_EVAL_MODEL=$MODEL_INPUT" >> "$GITHUB_ENV"
          elif [ -n "$MODEL_DEFAULT" ]; then
            echo "SKILL_EVAL_MODEL=$MODEL_DEFAULT" >> "$GITHUB_ENV"
          else
            echo "SKILL_EVAL_MODEL=gpt-4.1-mini" >> "$GITHUB_ENV"
          fi

      - name: Review PR skill with model API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL || vars.OPENAI_API_BASE_URL }}
        run: |
          mkdir -p .tmp
          python3 scripts/review_skill_pr_with_model.py \
            --skill-dir "pr-head/${{ steps.pr.outputs.skill_path }}" \
            --skill-slug "${{ steps.pr.outputs.skill_slug }}" \
            --model "$SKILL_EVAL_MODEL" \
            --output-json ".tmp/skill-pr-ai-eval.json" \
            --output-bundle ".tmp/${{ steps.pr.outputs.skill_slug }}-bundle.md"

      - name: Render PR comment
        run: |
          python3 scripts/render_skill_pr_ai_review.py \
            --input .tmp/skill-pr-ai-eval.json \
            --skill-slug "${{ steps.pr.outputs.skill_slug }}" \
            --model "$SKILL_EVAL_MODEL" \
            --pull-request-number "${{ steps.pr.outputs.pr_number }}" \
            --output .tmp/skill-pr-ai-eval-comment.md

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-pr-ai-eval-${{ steps.pr.outputs.skill_slug }}-${{ steps.pr.outputs.pr_number }}
          path: |
            .tmp/skill-pr-ai-eval.json
            .tmp/skill-pr-ai-eval-comment.md
            .tmp/${{ steps.pr.outputs.skill_slug }}-bundle.md

      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          COMMENT_FILE: .tmp/skill-pr-ai-eval-comment.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- skill-pr-ai-eval -->';
            const body = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const issue_number = Number('${{ steps.pr.outputs.pr_number }}');
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
